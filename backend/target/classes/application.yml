server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.jd.ecommerce.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true

# JWT
jwt:
  secret: jd-ecommerce-secret-key-2026-must-be-at-least-256-bits-long-for-hs256
  expiration: 86400000  # 24h in ms
  header: Authorization
  prefix: "Bearer "

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
